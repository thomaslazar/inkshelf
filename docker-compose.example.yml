services:
  inkshelf:
    # Published multi-arch image. Tags: :main (latest main build),
    # :X.Y.Z / :latest (tagged releases). Pin to a release for stability.
    image: ghcr.io/thomaslazar/inkshelf:main
    environment:
      ABS_URL: "http://audiobookshelf:80"
      DataProtectionKeysPath: "/keys"
      CachePath: "/cache"
    volumes:
      - inkshelf-keys:/keys
      - inkshelf-cache:/cache
    ports:
      - "8080:8080"
volumes:
  inkshelf-keys:
  inkshelf-cache:
