name: inkshelf-it
services:
  audiobookshelf:
    image: advplyr/audiobookshelf:2.35.1
    ports:
      - "13379:80"
    volumes:
      - abs-config:/config
      - abs-metadata:/metadata
    environment:
      - PORT=80
      # Disposable test stack: disable auth rate limiting so repeated logins
      # during dev/smoke don't hit ABS's 40-logins/10min cap.
      - RATE_LIMIT_AUTH_MAX=0

volumes:
  abs-config:
  abs-metadata:
